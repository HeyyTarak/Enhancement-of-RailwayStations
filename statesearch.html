<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Station</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            overflow: hidden;
        }

        .logo img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 1s ease-in-out;
        }

        .logo img:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .account-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #2193b0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .account-button:hover {
            background-color: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }

        .account-details {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            font-size: 14px;
            max-width: 220px;
            animation: fadeIn 0.3s ease-in;
            color: #2193b0;
        }

        .website-name {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        .search-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .search-bar {
            padding: 12px 40px 12px 50px;
            font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            width: 300px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
            outline: none;
            position: relative;
            margin-right: 10px;
            transition: box-shadow 0.3s ease;
            color: #2193b0;
        }

        .search-bar::placeholder {
            color: rgba(33, 147, 176, 0.7);
        }

        .search-bar:focus {
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .search-icon {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: rgba(33, 147, 176, 0.7);
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .search-bar:focus + .search-icon {
            color: #2193b0;
        }

        .search-button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #2193b0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-button:hover {
            background-color: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            animation: backgroundAnimation 10s infinite alternate;
        }

        @keyframes backgroundAnimation {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            min-width: 300px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            backdrop-filter: blur(10px);
            max-height: 200px;
            overflow-y: auto;
        }

        .dropdown-content a {
            color: #2193b0;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background-color 0.3s ease;
        }

        .dropdown-content a:hover {
            background-color: rgba(255, 255, 255, 1);
        }

        .show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    <div class="login-container">
        <div class="logo">
            <img src="Trainlogo.png" alt="Logo">
        </div>    
        <button class="account-button" onclick="toggleAccountDetails()">Account</button>
        <div class="account-details">
            <p><strong>Name:</strong> Y.V.Tarak Ram</p>
            <p><strong>ID:</strong> 23P61A05O0</p>
        </div>

        <div class="website-name">Hand Station</div>

        <div class="search-container">
            <div class="dropdown">
                <input type="text" class="search-bar" id="searchInput" placeholder="Enter your City" onfocus="showDropdown()" onblur="hideDropdown()">
                <span class="search-icon">&#128269;</span>
                <div id="dropdownContent" class="dropdown-content">
                    <a href="#" onclick="selectCity('Hyderabad')">Hyderabad</a>
                    <a href="#" onclick="selectCity('Bengaluru')">Bengaluru</a>
                    <a href="#" onclick="selectCity('Mumbai')">Mumbai</a>
                    <a href="#" onclick="selectCity('Delhi')">Delhi</a>
                    <a href="#" onclick="selectCity('Chennai')">Chennai</a>
                    <a href="#" onclick="selectCity('Kolkata')">Kolkata</a>
                    <a href="#" onclick="selectCity('Pune')">Pune</a>
                    <a href="#" onclick="selectCity('Ahmedabad')">Ahmedabad</a>
                    <a href="#" onclick="selectCity('Jaipur')">Jaipur</a>
                    <a href="#" onclick="selectCity('Surat')">Surat</a>
                </div>
            </div>
            <button class="search-button" onclick="search()">Search</button>
        </div>
    </div>

    <script>
        function toggleAccountDetails() {
            var details = document.querySelector('.account-details');
            details.style.display = (details.style.display === 'block') ? 'none' : 'block';
        }

        function showDropdown() {
            document.getElementById("dropdownContent").classList.add("show");
        }

        function hideDropdown() {
            setTimeout(() => {
                document.getElementById("dropdownContent").classList.remove("show");
            }, 200);
        }

        function selectCity(city) {
            document.getElementById('searchInput').value = city;
            hideDropdown();
        }

        function search() {
            var searchInput = document.getElementById('searchInput').value.toLowerCase();
            if (searchInput === 'hyderabad') {
                window.location.href = 'hyderabad.html';
            } else if (searchInput === 'bengaluru') {
                window.location.href = 'bengaluru.html';
            } else {
                alert('Please select "Hyderabad" or "Bengaluru" to see the results.');
            }
        }
    </script>
</body>
</html>
