<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Station</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #a2c2e2, #d0e6f2);
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }

        .logo img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 6px solid #4facfe;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 1s ease-in-out;
        }

        .logo img:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .account-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .account-button:hover {
            background-color: #367ecc;
            transform: scale(1.05);
        }

        .account-details {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            max-width: 220px;
            animation: fadeIn 0.3s ease-in;
        }

        .website-name {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4facfe;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-in-out;
        }

        .search-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .search-bar {
            padding: 12px 40px 12px 50px;
            font-size: 16px;
            border: 2px solid #4facfe;
            border-radius: 25px;
            width: 300px;
            background-color: #fff;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
            outline: none;
            position: relative;
            margin-right: 10px;
            transition: box-shadow 0.3s ease;
        }

        .search-bar::placeholder {
            color: #888;
        }

        .search-bar:focus {
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.5);
        }

        .search-icon {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #4facfe;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .search-bar:focus + .search-icon {
            color: #367ecc;
        }

        .search-button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .search-button:hover {
            background-color: #367ecc;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="Trainlogo.png" alt="Logo">
        </div>    
        <button class="account-button" onclick="toggleAccountDetails()">Account</button>
        <div class="account-details">
            <p><strong>Name:</strong> Y.V.Tarak Ram</p>
            <p><strong>ID:</strong> 23P61A05O0</p>
        </div>

        <div class="website-name">Hand Station</div>

        <div class="search-container">
            <input type="text" class="search-bar" id="searchInput" placeholder="Enter your City">
            <span class="search-icon">&#128269;</span>
            <button class="search-button" onclick="search()">Search</button>
        </div>
        
    </div>

    <script>
        function toggleAccountDetails() {
            var details = document.querySelector('.account-details');
            details.style.display = (details.style.display === 'block') ? 'none' : 'block';
        }

        function search() {
            var searchInput = document.getElementById('searchInput').value.toLowerCase();
            if (searchInput === 'hyderabad') {
                window.location.href = 'hyderabad.html';
            } else if (searchInput === 'bengaluru') {
                window.location.href = 'bengaluru.html';
            } else {
                alert('Please enter "Hyderabad" or "Bengaluru" to see the results.');
            }
        }
    </script>
</body>
</html>
