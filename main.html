<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Station</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #d0e1f9, #4facfe);
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }

        .account-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .account-button:hover {
            background-color: #367ecc;
        }

        .account-details {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-size: 14px;
        }

        .website-name {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4facfe;
        }

        .search-container {
            margin-top: 20px;
            position: relative;
        }

        .search-bar {
            padding: 10px 40px 10px 15px;
            font-size: 16px;
            border: 2px solid #4facfe;
            border-radius: 25px;
            width: 300px;
            background-color: #fff;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.1);
            outline: none;
        }

        .search-bar::placeholder {
            color: #888;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            color: #4facfe;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <button class="account-button" onclick="toggleAccountDetails()">Account</button>
    <div class="account-details">
        <p><strong>Name:</strong> John Doe</p>
        <p><strong>ID:</strong> 12345</p>
    </div>

    <div class="website-name">Hand Station</div>

    <div class="search-container">
        <input type="text" class="search-bar" id="searchInput" placeholder="Enter your state">
        <span class="search-icon">&#128269;</span>
        <button class="search-button" onclick="search()">Search</button>
    </div>

    <script>
        function toggleAccountDetails() {
            var details = document.querySelector('.account-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
            } else {
                details.style.display = 'block';
            }
        }

        function search() {
            var searchInput = document.getElementById('searchInput').value;
            if (searchInput.toLowerCase() === 'hyderabad') {
                window.location.href = 'results.html';
            } else {
                alert('Please enter "Hyderabad" to see the results.');
            }
        }
    </script>
</body>
</html>
