<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #d0e1f9, #4facfe);
            overflow: hidden; /* Prevents scroll bars */
        }

        .login-container {
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            background-color: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeIn 1s ease-in-out; /* Smooth fade-in animation */
        }

        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #eceff1;
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; /* Smooth zoom and fade effects */
            animation: fadeIn 1.5s ease-out; /* Fade-in effect on load */
        }

        .logo img:hover {
            transform: scale(1.1); /* Zoom effect on hover */
            opacity: 0.8; /* Slight fade effect on hover */
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: #333;
            font-size: 24px; /* Adjust font size for better readability */
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            background-color: #f4f4f4;
            box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.05);
            transition: background-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box; /* Ensure padding and border are included in width */
        }

        .input-field:focus {
            background-color: #e0f7ff;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.5);
            outline: none;
        }

        .login-button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            color: #fff;
            background-color: #4facfe;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
        }

        .login-button:hover {
            background-color: #367ecc;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); /* Enhanced shadow on hover */
            transform: translateY(-2px); /* Subtle lift effect */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="Trainlogo.png" alt="Logo">
        </div>
        <h2>Welcome Back!</h2>
        <input type="text" class="input-field" placeholder="Username">
        <input type="password" class="input-field" placeholder="Password">
        <button class="login-button" onclick="window.location.href='statesearch.html'">Login</button>
    </div>
</body>
</html>
