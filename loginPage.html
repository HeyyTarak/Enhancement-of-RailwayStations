<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            background-size: 200% 200%;
            animation: gradientAnimation 10s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Login Container */
        .login-container {
            width: 90%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .logo img:hover {
            transform: scale(1.1);
        }

        /* Heading */
        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: #333;
            font-size: 28px;
        }

        /* Input Fields */
        .input-group {
            position: relative;
            margin: 20px 0;
        }

        .input-field {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 16px;
            background-color: #f9f9f9;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }

        .input-field:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 10px rgba(106, 17, 203, 0.3);
            outline: none;
        }

        .input-group i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            cursor: pointer;
            transition: color 0.3s;
        }

        .input-group i:hover {
            color: #6a11cb;
        }

        /* Login Button */
        .login-button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            color: #fff;
            background: linear-gradient(135deg, #7ac3e6, #2575fc);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.3);
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(106, 17, 203, 0.4);
        }

        /* Forgot Password */
        .forgot-password {
            margin-top: 15px;
            font-size: 14px;
            color: #6a11cb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #2575fc;
        }

        /* Error Message */
        .error-message {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background-color: #ffebee;
            color: #c62828;
            border-radius: 5px;
            font-size: 14px;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Password Toggle */
        .fa-eye-slash {
            color: #6a11cb;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
            }

            .logo img {
                width: 100px;
                height: 100px;
            }

            h2 {
                font-size: 24px;
            }

            .input-field {
                padding: 12px 40px 12px 15px;
                font-size: 14px;
            }

            .login-button {
                font-size: 16px;
                padding: 12px;
            }

            .forgot-password {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="Trainlogo.png" alt="Logo">
        </div>
        <h2>Welcome Back!</h2>
        <form id="loginForm" onsubmit="validateForm(event)">
            <div class="input-group">
                <input type="text" class="input-field" id="username" placeholder="Username" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" class="input-field" id="password" placeholder="Password" required>
                <i class="fas fa-eye" onclick="togglePasswordVisibility()"></i>
            </div>
            <button type="submit" class="login-button">Login</button>
            <div class="error-message" id="errorMessage">Please enter both username and password.</div>
        </form>
        <a href="#" class="forgot-password">Forgot Password?</a>
    </div>

    <script>
        function validateForm(event) {
            event.preventDefault();

            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var errorMessage = document.getElementById("errorMessage");

            if (username.trim() === "" || password.trim() === "") {
                errorMessage.style.display = "block";
                return false;
            } else {
                errorMessage.style.display = "none";
                window.location.href = "statesearch.html"; // Redirect after successful login
            }
        }

        function togglePasswordVisibility() {
            var passwordField = document.getElementById("password");
            var eyeIcon = document.querySelector(".fa-eye");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
