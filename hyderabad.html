<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Stations in Hyderabad</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #d0e1f9, #e3f2fd);
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }

        .account-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .account-button:hover {
            background-color: #367ecc;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .account-details {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            max-width: 200px;
        }

        .website-name {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4facfe;
        }

        .station-list {
            list-style-type: none;
            padding: 0;
            margin: 20px auto;
            max-width: 600px;
        }

        .station-button {
            display: block;
            margin: 10px auto;
            padding: 15px;
            font-size: 18px;
            color: white;
            background-color: #4facfe;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .station-button:hover {
            background-color: #367ecc;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .station-button:active {
            transform: scale(1.02);
        }

        .logo img {
            width: 120px;
            height: 120px; 
            border-radius: 50%; 
            margin-bottom: 20px;
            border: 3px solid #4facfe;
        }

        
    </style>
</head>
<body>
    <div class="logo">
        <img src="Trainlogo.png" alt="Logo">
    </div>
    <button class="account-button" onclick="toggleAccountDetails()">Account</button>
    <div class="account-details">
        <p><strong>Name:</strong> Y.V.Tarak Ram</p>
        <p><strong>ID:</strong> 23P61A05O0</p>
    </div>

    <div class="website-name">Hand Station</div>

    <ul class="station-list">
        <li><button class="station-button">Hyderabad Deccan</button></li>
        <li><button class="station-button">Secunderabad Junction</button></li>
        <li><button class="station-button">Kachiguda</button></li>
        <li><button class="station-button">Lingampalli</button></li>
        <li><button class="station-button">Hitech City</button></li>
    </ul>

    <script>
        function toggleAccountDetails() {
            var details = document.querySelector('.account-details');
            details.style.display = (details.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
